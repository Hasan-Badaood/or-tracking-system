services:
  # ── Backend API (Docker) ─────────────────────────────────────────────────
  - type: web
    name: or-tracking-api
    runtime: docker
    dockerfilePath: ./server/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DB_HOST
        value: ep-winter-band-aiyourfe.c-4.us-east-1.aws.neon.tech
      - key: DB_PORT
        value: 5432
      - key: DB_NAME
        value: neondb
      - key: DB_USER
        value: neondb_owner
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: SEED_SECRET
        generateValue: true
      # Optional — add EMAIL_* and TWILIO_* vars manually in the Render dashboard

  # ── Frontend (Static Site) ────────────────────────────────────────────────
  - type: web
    name: or-tracking-client
    runtime: static
    buildCommand: npm install -g pnpm@10 && pnpm install --filter or-tracking-frontend && pnpm --filter or-tracking-frontend build
    staticPublishPath: ./client/dist
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Set this to your backend URL after the first deploy, e.g.:
      # https://or-tracking-api.onrender.com/api
      - key: VITE_API_URL
        sync: false
